<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>

    <!-- Carousel Start -->
    <div id="myCarousel" class="carousel slide" data-ride="carousel">

        <div class="carousel-inner">

            <div class="item first-slide">
                <img src="https://via.placeholder.com/800x400?text=Slide+1" class="img-responsive">
            </div>

            <div class="item second-slide">
                <img src="https://via.placeholder.com/800x400?text=Slide+2" class="img-responsive">
            </div>

            <div class="item third-slide active">
                <img src="https://via.placeholder.com/800x400?text=Slide+3" class="img-responsive">
            </div>

            <div class="item fourth-slide">
                <img src="https://via.placeholder.com/800x400?text=Slide+4" class="img-responsive">
            </div>

            <div class="item fifth-slide">
                <img src="https://via.placeholder.com/800x400?text=Slide+5" class="img-responsive">
            </div>

        </div>

        <!-- Left Arrow -->
        <a class="left carousel-control" href="#myCarousel" data-slide="prev">
            <span class="glyphicon glyphicon-chevron-left"></span>
        </a>

        <!-- Right Arrow -->
        <a class="right carousel-control" href="#myCarousel" data-slide="next">
            <span class="glyphicon glyphicon-chevron-right"></span>
        </a>

    </div>
    <!-- Carousel End -->

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</body>
</html>
